version: "3.9"

services:
  backend:
    build: ./backend
    container_name: songroulette-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: songroulette-frontend
    ports:
      - "5173:5173"
    volumes:
       - ./frontend:/app
       - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
